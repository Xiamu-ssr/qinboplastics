name: Deploy to Aliyun OSS

# 每次推送到 main 分支自动部署；也可在 Actions 页面手动触发（workflow_dispatch）
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 下载阿里云官方 ossutil（多版本容错，避免单一版本下线导致失败）
      - name: Download ossutil
        run: |
          set -e
          for v in 1.7.18 1.7.15 1.7.16; do
            echo "尝试下载 ossutil $v ..."
            if curl -fsSL "https://gosspublic.alicdn.com/ossutil/$v/ossutil64" -o ossutil; then
              echo "✓ 下载成功：$v"
              break
            fi
          done
          chmod +x ossutil
          ./ossutil --version

      # 3. 配置凭证（从 GitHub Secrets 读取，不会出现在日志里）
      - name: Configure ossutil
        run: |
          ./ossutil config \
            -e "${{ secrets.OSS_ENDPOINT }}" \
            -i "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            -k "${{ secrets.OSS_ACCESS_KEY_SECRET }}" \
            -L CH

      # 4. 构建长尾 SEO 着陆页（4 大类 + 20+ 材料族 + 200+ 牌号，中英文）
      #    脚本读 assets/data/products.js 自动生成 _site/products/ 和 _site/en/products/ 下的独立 HTML
      #    并把全部新 URL 合并进 _site/sitemap.xml
      - name: Build SEO landing pages
        run: |
          mkdir -p _site
          cp -r index.html about.html products.html trade.html contact.html baidu_verify_codeva-KuJZnrnD3y.html assets en _site/
          cp sitemap.xml robots.txt _site/
          node scripts/build_seo_pages.js
          echo "=== 新生成的 SEO 页数 ==="
          find _site/products _site/en/products -type f | wc -l
          echo "=== 新 sitemap 大小 ==="
          wc -l _site/sitemap.xml

      # 6. 上传到 OSS
      #    cp -rf --update：递归上传，只覆盖有变化的文件（增量，快）
      #    --meta 显式声明 Content-Type，避免 OSS 误判为 application/xml（修 Google 看到 Translate this page 标签）
      - name: Upload to OSS
        run: |
          # 先做默认的增量上传（保留 --update，节省流量）
          ./ossutil cp -rf --update _site/ oss://${{ secrets.OSS_BUCKET }}/
          # 再补一刀：对 HTML/JS/CSS/XML/图片等显式设 Content-Type，覆盖 OSS 误判
          echo "=== 补 Content-Type 头 ==="
          for f in $(find _site -type f \( \
                -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" -o \
                -name "*.xml" -o -name "*.txt" -o -name "*.svg" -o -name "*.png" -o \
                -name "*.jpg" -o -name "*.jpeg" -o -name "*.webp" -o -name "*.ico" -o \
                -name "*.woff" -o -name "*.woff2" \
              \)); do
            case "$f" in
              *.html)        CT="text/html; charset=utf-8" ;;
              *.css)         CT="text/css; charset=utf-8" ;;
              *.js)          CT="application/javascript; charset=utf-8" ;;
              *.json)        CT="application/json; charset=utf-8" ;;
              *.xml)         CT="application/xml; charset=utf-8" ;;
              *.txt)         CT="text/plain; charset=utf-8" ;;
              *.svg)         CT="image/svg+xml" ;;
              *.png)         CT="image/png" ;;
              *.jpg|*.jpeg)  CT="image/jpeg" ;;
              *.webp)        CT="image/webp" ;;
              *.ico)         CT="image/x-icon" ;;
              *.woff)        CT="font/woff" ;;
              *.woff2)       CT="font/woff2" ;;
              *)             continue ;;
            esac
            remote="oss://${{ secrets.OSS_BUCKET }}/${f#_site/}"
            ./ossutil set-meta "$remote" "Content-Type:$CT" 2>/dev/null || true
          done
          echo "=== Content-Type 补完 ==="

      # 7. 部署完成通知 IndexNow（Bing / Yandex / Seznam / Naver 立即来爬）
      #    不需要 API key：IndexNow v2 用 8 位 keyLocation + 8~128 位 key；缺 keyLocation 时落空但不影响部署
      - name: Ping IndexNow
        if: hashFiles('sitemap.xml') != ''
        run: |
          echo "=== Ping IndexNow ==="
          # 提交通常变更的几个核心 URL
          for url in \
            "https://www.qinboplastics.com/" \
            "https://www.qinboplastics.com/products.html" \
            "https://www.qinboplastics.com/trade.html" \
            "https://www.qinboplastics.com/about.html" \
            "https://www.qinboplastics.com/contact.html" \
            "https://www.qinboplastics.com/en/" \
            "https://www.qinboplastics.com/en/products.html" \
            "https://www.qinboplastics.com/sitemap.xml"; do
            # IndexNow 单 URL 提交（无需 key 也尝试；部分搜索引擎会接受）
            code=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
              "https://api.indexnow.org/indexnow?url=$url&key=qinbo2026" || echo 0)
            echo "  IndexNow $url → $code"
          done
          # 主动 ping 各大搜索引擎的 sitemap
          echo "=== Ping sitemap 端点 ==="
          for endpoint in \
            "https://www.google.com/ping?sitemap=https://www.qinboplastics.com/sitemap.xml" \
            "https://www.bing.com/ping?sitemap=https://www.qinboplastics.com/sitemap.xml"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0" "$endpoint" || echo 0)
            echo "  $endpoint → $code"
          done
          echo "=== 通知完成 ==="
